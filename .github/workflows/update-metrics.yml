name: Update metrics from Hex

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 8am ET (UTC-5), weekdays
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch metrics from Hex
        run: node scripts/update-metrics.js
        env:
          HEX_API_TOKEN: ${{ secrets.HEX_API_TOKEN }}

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: auto-update metrics from Hex [skip ci]"
          git push
